version: '3.8'

services:
  app:
    image: ghcr.io/johnnycyan/thirsti-tracker:latest
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - JWT_SECRET=change-this-to-a-secure-secret-in-production
      - DISABLE_REGISTRATION=false
    volumes:
      - thirsti_data:/app/data
    restart: unless-stopped

volumes:
  thirsti_data:
